server:
  port: 8084

spring:
  application:
    name: wallet-service
  config:
    import: optional:/Users/mac/escrow_project/wallet-service/.env[.properties]
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  cloud:
    function:
      definition: createUserWallet;createUserWalletDlq;creditWalletOnPaymentCompletion;creditWalletOnPaymentCompletionDlq
    stream:
      bindings:
        createUserWallet-in-0:
          destination: user-registered
          group: ${spring.application.name}
          consumer:
            max-attempts: 3
            back-off-initial-interval: 1000
            back-off-multiplier: 2.0
            back-off-max-interval: 10000
        creditWalletOnPaymentCompletion-in-0:
          destination: payment-completed
          group: ${spring.application.name}
          consumer:
            max-attempts: 3
            back-off-initial-interval: 1000
            back-off-multiplier: 2.0
            back-off-max-interval: 10000
        createUserWalletDlq-in-0:
          destination: create-user-wallet.DLQ
          group: ${spring.application.name}-creation-dlq
        creditWalletOnPaymentCompletionDlq-in-0:
          destination: credit-wallet-on-payment-completion.DLQ
          group: ${spring.application.name}-credit-dlq
      kafka:
        binder:
          brokers:
            - localhost:9092
        bindings:
          createUserWallet-in-0:
            consumer:
              enable-dlq: true
              dlq-name: create-user-wallet.DLQ
          creditWalletOnPaymentCompletion-in-0:
            consumer:
              enable-dlq: true
              dlq-name: credit-wallet-on-payment-completion.DLQ

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
      show-components: always
      probes:
        enabled: true
  health:
    readinessstate:
      enabled: true
    livenessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    root: INFO
    com.samjay: TRACE

eureka:
  instance:
    prefer-ip-address: true
  client:
    fetchRegistry: true
    registerWithEureka: true
    serviceUrl:
      defaultZone: http://localhost:8082/eureka/