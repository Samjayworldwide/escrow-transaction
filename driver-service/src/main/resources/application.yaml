server:
  port: 8086

spring:
  application:
    name: driver-service
  config:
    import: optional:/Users/mac/escrow_project/driver-service/.env[.properties]
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080
          jwk-set-uri: http://localhost:8080/oauth2/jwks
  cloud:
    function:
      definition: createDriver;createDriverDlq;driverSearch;driverSearchDlq
    stream:
      bindings:
        createDriver-in-0:
          destination: user-registered
          group: ${spring.application.name}
          consumer:
            max-attempts: 3
            back-off-initial-interval: 1000
            back-off-multiplier: 2.0
            back-off-max-interval: 10000
        driverSearch-in-0:
          destination: driver-search
          group: ${spring.application.name}
          consumer:
            max-attempts: 3
            back-off-initial-interval: 1000
            back-off-multiplier: 2.0
            back-off-max-interval: 10000
        createDriverDlq-in-0:
          destination: create-driver.DLQ
          group: ${spring.application.name}-creation-dlq
        driverSearchDlq-in-0:
          destination: driver-search.DLQ
          group: ${spring.application.name}-search-dlq
      kafka:
        binder:
          brokers:
            - localhost:9092
        bindings:
          createDriver-in-0:
            consumer:
              enable-dlq: true
              dlq-name: create-driver.DLQ
          driverSearch-in-0:
            consumer:
              enable-dlq: true
              dlq-name: driver-search.DLQ

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
      show-components: always
      probes:
        enabled: true
  health:
    readinessstate:
      enabled: true
    livenessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    root: INFO
    com.samjay: TRACE

azure:
  storage:
    connection-string: ${AZURE_STORAGE_CONNECTION_STRING}
    container-name: ${AZURE_STORAGE_CONTAINER_NAME}
    sas-expiry-minutes: 10

eureka:
  instance:
    prefer-ip-address: true
  client:
    fetchRegistry: true
    registerWithEureka: true
    serviceUrl:
      defaultZone: http://localhost:8082/eureka/

redis:
  host: localhost
  port: 6379
  pool:
    max-total: 20
    max-idle: 10
    min-idle: 5
    max-wait-millis: 3000