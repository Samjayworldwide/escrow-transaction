server:
  port: 8087

spring:
  application:
    name: order-service
  config:
    import: optional:/Users/mac/escrow_project/order-service/.env[.properties]
  threads:
    virtual:
      enabled: true
  grpc:
    client:
      channels:
        customer-service:
          address: "localhost:9090"
          negotiation-type: plaintext
    server:
      port: 9091
      reflection:
        enabled: true
  data:
    redis:
      host: localhost
      port: 6379
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080
          jwk-set-uri: http://localhost:8080/oauth2/jwks
  cloud:
    function:
      definition: updateOrderAfterPaymentVerification;updateOrderAfterPaymentVerificationDlq
    stream:
      kafka:
        binder:
          brokers:
            - localhost:9092
          producer-properties:
            retries: 3
            retry.backoff.ms: 1000
            acks: all
            enable.idempotence: true
            max.in.flight.requests.per.connection: 5
            delivery.timeout.ms: 30000
            request.timeout.ms: 10000
        bindings:
          updateOrderAfterPaymentVerification-in-0:
            consumer:
              enable-dlq: true
              dlq-name: update-order-after-payment-verification.DLQ
      bindings:
        createOrder-out-0:
          destination: order-created
          producer:
            error-channel-enabled: true
        orderApproval-out-0:
          destination: order-approved
          producer:
            error-channel-enabled: true
        updateOrderAfterPaymentVerification-in-0:
          destination: payment-verified
          group: ${spring.application.name}
          consumer:
            max-attempts: 3
            back-off-initial-interval: 1000
            back-off-multiplier: 2.0
            back-off-max-interval: 10000
        updateOrderAfterPaymentVerification-out-0:
          destination: payment-completed
          producer:
            error-channel-enabled: true
        updateOrderAfterPaymentVerificationDlq-in-0:
          destination: update-order-after-payment-verification.DLQ
          group: ${spring.application.name}-payment-verification-dlq

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
      show-components: always
      probes:
        enabled: true
  health:
    outbox:
      enabled: true
    readinessstate:
      enabled: true
    livenessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    root: INFO
    com.samjay: TRACE

eureka:
  instance:
    prefer-ip-address: true
  client:
    fetchRegistry: true
    registerWithEureka: true
    serviceUrl:
      defaultZone: http://localhost:8082/eureka/

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        permitted-number-of-calls-in-half-open-state: 2
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        slow-call-duration-threshold: 2s
        slow-call-rate-threshold: 50

    instances:
      interServiceCircuit:
        base-config: default

  retry:
    configs:
      default:
        max-attempts: 2
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - io.grpc.StatusRuntimeException

    instances:
      interServiceRetry:
        base-config: default

  bulkhead:
    configs:
      default:
        max-concurrent-calls: 20
        max-wait-duration: 0

    instances:
      interServiceBulkhead:
        base-config: default

azure:
  storage:
    connection-string: ${AZURE_STORAGE_CONNECTION_STRING}
    container-name: ${AZURE_STORAGE_CONTAINER_NAME}

redis:
  pool:
    host: localhost
    port: 6379
    max-active: 20
    max-idle: 10
    min-idle: 5
    max-wait: 10000ms

outbox:
  poll:
    pending-interval-ms: 5000
    retry-interval-ms: 60000
    cleanup-interval-ms: 3600000
    batch-size: 50
    backoff-multiplier-seconds: 30
    cleanup-retention-hours: 24