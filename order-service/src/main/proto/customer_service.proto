syntax = "proto3";

package customerService;

option java_multiple_files = true;

option java_package = "com.samjay";

option java_outer_classname = "customerServiceProto";


service CustomerService {

  rpc ValidateAndFetchCustomerUsername(ValidateAndFetchCustomerUsernameRequest) returns (ValidateAndFetchCustomerUsernameResponse);

}

message ValidateAndFetchCustomerUsernameRequest {

  string username = 1;

}

message ValidateAndFetchCustomerUsernameResponse {

  bool isUsernameValid = 1;

  string email = 2;

  string userId = 3;

}